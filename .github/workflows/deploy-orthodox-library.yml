name: Deploy Orthodox Library

on:
  push:
    branches:
      - main
    paths:
      - 'orthodox-library-app/**'
      - 'backend/models/LiturgicalBook.js'
      - 'backend/models/LiturgicalBlock.js'
      - 'backend/models/VolunteerAssignment.js'
      - 'backend/models/VolunteerProfile.js'
      - 'backend/routes/orthodoxLibrary.js'
      - 'backend/routes/volunteerProfiles.js'
  workflow_dispatch:

jobs:
  build_and_deploy_frontend:
    runs-on: ubuntu-latest
    name: Build and Deploy Orthodox Library Frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: orthodox-library-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: orthodox-library-app

      - name: Build Next.js app
        run: npm run build
        working-directory: orthodox-library-app
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.LIBRARY_API_BASE_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIBRARY }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: orthodox-library-app
          output_location: .next
          skip_app_build: true
