name: Build and deploy Node.js app to Azure Web App - cms-system

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install
          npm prune --production

      - name: Verify critical files exist
        run: |
          echo "=== Verifying utils folder ==="
          ls -la backend/utils/
          echo "=== Verifying qrCodeGenerator ==="
          cat backend/utils/qrCodeGenerator.js | head -3
          echo "=== Verifying routes ==="
          ls -la backend/routes/

      - name: Create deployment package
        run: |
          # Deploy as a folder with backend/ subfolder so Azure runs: node backend/server.js
          mkdir -p deploy/backend
          cp -r backend/. deploy/backend/
          # Remove .env so Azure uses its own environment variables
          rm -f deploy/backend/.env
          # Remove oryx-manifest to prevent Azure from using stale cached build
          rm -f deploy/backend/oryx-manifest.toml
          echo "=== Deployment structure ==="
          ls -la deploy/
          ls -la deploy/backend/
          ls -la deploy/backend/utils/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify deployment package
        run: |
          echo "=== Downloaded artifact structure ==="
          ls -la
          ls -la backend/
          ls -la backend/utils/
          echo "=== qrCodeGenerator exists: ==="
          test -f backend/utils/qrCodeGenerator.js && echo "YES" || echo "NO - MISSING!"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cms-system'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CMS_SYSTEM }}
          package: .
