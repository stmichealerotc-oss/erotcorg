name: Build and deploy Node.js app to Azure Web App - cms-system

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install
          npm prune --production

      - name: Verify critical files exist
        run: |
          echo "=== Verifying all route files ==="
          ls -la backend/routes/
          echo "=== Verifying utils folder ==="
          ls -la backend/utils/
          echo "=== Total backend files ==="
          find backend -name "*.js" | wc -l

      - name: Create deployment package
        run: |
          # Structure: deploy/backend/ so Azure runs: node backend/server.js from wwwroot
          mkdir -p deploy/backend
          cp -r backend/. deploy/backend/
          # Remove files that should not be deployed
          rm -f deploy/backend/.env
          # Override oryx-manifest to prevent Azure using stale cached build
          # Setting SCM_DO_BUILD_DURING_DEPLOYMENT=false in .deployment handles this
          echo "=== Final deployment structure ==="
          ls -la deploy/backend/
          ls -la deploy/backend/routes/
          ls -la deploy/backend/utils/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify deployment package
        run: |
          echo "=== Artifact structure ==="
          ls -la
          ls -la backend/
          ls -la backend/routes/
          ls -la backend/utils/
          echo "=== Key files check ==="
          test -f backend/server.js && echo "server.js: OK" || echo "server.js: MISSING"
          test -f backend/routes/contact.js && echo "routes/contact.js: OK" || echo "routes/contact.js: MISSING"
          test -f backend/utils/qrCodeGenerator.js && echo "utils/qrCodeGenerator.js: OK" || echo "utils/qrCodeGenerator.js: MISSING"
          test -f backend/.deployment && echo ".deployment: OK" || echo ".deployment: MISSING"

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cms-system'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CMS_SYSTEM }}
          package: .
