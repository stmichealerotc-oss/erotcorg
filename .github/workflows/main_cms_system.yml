name: Build and deploy Node.js app to Azure Web App - cms-system

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          npm install
          npm prune --production
      - name: Create deployment package
        run: |
          cd backend
          # Create a zip that preserves folder structure
          zip -r ../backend-deploy.zip . -x "*.git*" -x "node_modules/.cache/*" -x ".env"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend-deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Extract deployment package
        run: |
          unzip backend-deploy.zip -d backend
          ls -la backend/
          ls -la backend/utils/
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cms-system'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CMS_SYSTEM }}
          package: ./backend
